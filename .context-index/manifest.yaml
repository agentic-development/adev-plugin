# manifest.yaml — Agentic Development Framework Configuration
# Generated by /adev-init. Edit as needed, then run /adev-sync.

# ============================================================================
# Project Metadata
# ============================================================================

project:
  name: "adev-plugin"
  description: "Claude Code plugin and CLI implementing a full-lifecycle Agentic Development Framework"
  type: cli

# ============================================================================
# Sync Targets
# ============================================================================

sync:
  targets:
    - path: CLAUDE.md
      format: claude

# ============================================================================
# Modules
# ============================================================================

modules:
  - slug: cli
    name: CLI
    paths:
      - cli/

  - slug: hooks
    name: Hooks
    paths:
      - hooks/

  - slug: setup
    name: Setup
    paths:
      - skills/adev-init/
      - skills/adev-sync/
      - templates/

  - slug: design
    name: Design
    paths:
      - skills/adev-brainstorm/
      - skills/adev-specify/

  - slug: assessment
    name: Assessment
    paths:
      - skills/adev-review-specs/
      - skills/adev-route/

  - slug: planning
    name: Planning
    paths:
      - skills/adev-plan/

  - slug: implementation
    name: Implementation
    paths:
      - skills/adev-implement/
      - skills/adev-debug/
      - skills/adev-recover/

  - slug: validation
    name: Validation
    paths:
      - skills/adev-validate/
      - skills/adev-eval/

  - slug: maintenance
    name: Maintenance
    paths:
      - skills/adev-hygiene/
      - skills/adev-repomap/
      - skills/adev-sample/
      - skills/adev-retro/

# ============================================================================
# External Contexts
# ============================================================================

external_contexts: []

# ============================================================================
# Specialists
# ============================================================================

specialists: []

# ============================================================================
# Quality Gates
# ============================================================================

gates:
  test: "npm test"

# ============================================================================
# Completion Policy
# ============================================================================

completion:
  merge_policy: pr
  protected_branches:
    - main
    - master
  branch_naming: "<type>/<module>/<short-description>"

# ============================================================================
# Repo Map Configuration
# ============================================================================

repomap:
  exclude:
    - "node_modules/**"
    - "dist/**"
    - "build/**"
    - "coverage/**"
    - "*.min.js"
    - "*.generated.*"

# ============================================================================
# Hygiene
# ============================================================================

hygiene:
  staleness_threshold_days: 30
  source_roots:
    - cli/
    - hooks/
    - skills/
    - templates/
  coverage_exclude:
    - "tests/**"
    - "skills/*/evals/**"
