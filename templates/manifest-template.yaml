# manifest.yaml — Agentic Development Framework Configuration
# This file lives at .context-index/manifest.yaml and controls how adev operates.
# Generated by /adev-init. Edit as needed, then run /adev-sync.

# ============================================================================
# Project Metadata
# ============================================================================

project:
  name: "{{ project_name }}"
  description: "{{ project_description }}"
  # Repository type: monorepo | single-app | library | cli
  type: single-app

# ============================================================================
# Sync Targets
# Defines which agent files are generated from the constitution.
# Each target gets a tailored version of the constitution content.
# Run /adev-sync after editing the constitution to update these.
# ============================================================================

sync:
  targets:
    - path: CLAUDE.md
      format: claude
      # Claude format includes full constitution + context index summary + user additions section

    # Uncomment targets as needed:
    # - path: AGENTS.md
    #   format: agents
    #   # AGENTS.md format includes full constitution + project context pointer

    # - path: .github/copilot-instructions.md
    #   format: copilot
    #   # Copilot format includes principles and coding standards only (no context routing)

    # - path: .cursorrules
    #   format: cursor
    #   # Cursor format includes full constitution with Cursor-compatible references

# ============================================================================
# Modules
# Registered feature modules. Each module corresponds to a Feature Charter
# at .context-index/specs/features/<module-slug>/charter.md
# ============================================================================

modules: []
  # - slug: auth
  #   name: Authentication
  #   paths:
  #     - src/auth/
  #     - src/middleware/auth.ts

  # - slug: api
  #   name: API Layer
  #   paths:
  #     - src/api/
  #     - src/routes/

# ============================================================================
# External Contexts
# References to external repositories, API contracts, or shared standards
# that this project depends on. Files are stored in .context-index/references/.
# Run /adev-hygiene to check freshness against refresh_interval_days.
# ============================================================================

external_contexts: []
  # - slug: company-standards
  #   source: github:org/company-standards/main
  #   path: .context-index/
  #   refresh_interval_days: 7

  # - slug: api-contracts
  #   source: https://api.example.com/openapi.yaml
  #   path: openapi.yaml
  #   refresh_interval_days: 3

  # - slug: design-system
  #   source: github:org/design-system/main
  #   path: docs/tokens/
  #   refresh_interval_days: 14

# ============================================================================
# Specialists
# Domain expert subagent prompts for /adev-implement task routing.
# Each specialist is a markdown file with a system prompt.
# ============================================================================

specialists: []
  # - slug: database
  #   name: Database Specialist
  #   prompt: .context-index/specialists/database.md
  #   triggers:
  #     - "*.prisma"
  #     - "src/db/**"
  #     - "migrations/**"

  # - slug: frontend
  #   name: Frontend Specialist
  #   prompt: .context-index/specialists/frontend.md
  #   triggers:
  #     - "src/components/**"
  #     - "src/pages/**"
  #     - "*.css"

# ============================================================================
# Quality Gates
# Commands that must pass for implementation to be considered complete.
# These are also recorded in the constitution but listed here for tooling.
# ============================================================================

gates:
  test: ""          # e.g., "npm test", "pytest", "go test ./..."
  lint: ""          # e.g., "npm run lint", "ruff check .", "golangci-lint run"
  typecheck: ""     # e.g., "npx tsc --noEmit", "mypy .", "go vet ./..."
  # Custom gates (optional):
  # build: "npm run build"
  # bundle-size: "npx size-limit"

# ============================================================================
# Completion Policy
# Controls what happens after implementation and validation pass.
# ============================================================================

completion:
  merge_policy: pr          # pr | merge | ask
  # pr:    Always open a pull request. Never merge directly. (default, recommended)
  # merge: Allow direct merge to the target branch after validation passes.
  # ask:   Ask the user each time whether to open a PR or merge.
  protected_branches:
    - main
    - master
  # Branches that agents must NEVER merge to or push to directly,
  # regardless of merge_policy. Always open a PR for these.
  branch_naming: "<type>/<module>/<short-description>"
  # Convention for feature branch names. Not enforced, but referenced by skills.
  # <type>:  feat | fix | chore | spike | refactor | docs
  # <module>: charter module name (same scope as commit messages)
  # <short-description>: kebab-case, 2-4 words
  # Examples: feat/auth/login-flow, fix/payments/webhook-retry

# ============================================================================
# Repo Map Configuration
# Controls how /adev-repomap scans the repository.
# ============================================================================

repomap:
  # File patterns to exclude from the repo map (in addition to .gitignore)
  exclude:
    - "node_modules/**"
    - "dist/**"
    - "build/**"
    - ".next/**"
    - "coverage/**"
    - "*.min.js"
    - "*.generated.*"
  # Supported languages are auto-detected. Override here if needed:
  # languages:
  #   - typescript
  #   - python

# ============================================================================
# Hygiene
# Configuration for /adev-hygiene audits.
# ============================================================================

# ============================================================================
# Governance (Optional)
# Declarative quality gates, boundary rules, and risk policies.
# Stored in .context-index/governance/. Run /adev-init to scaffold.
# When present, governance files take precedence over the gates: section above.
# ============================================================================

# governance:
#   gates: .context-index/governance/gates.yaml
#   boundaries: .context-index/governance/boundaries.yaml
#   risk_policies: .context-index/governance/risk-policies.yaml
#   overrides: .context-index/governance/overrides/

hygiene:
  # Number of days before a spec is considered stale
  staleness_threshold_days: 30
  # Directories to check for charter coverage
  source_roots:
    - src/
  # Patterns to ignore in coverage checks
  coverage_exclude:
    - "src/**/*.test.*"
    - "src/**/*.spec.*"
    - "src/**/test/**"
    - "src/**/__tests__/**"
