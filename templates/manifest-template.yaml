# manifest.yaml — Agentic Development Framework Configuration
# This file lives at .context-kit/manifest.yaml and controls how adev operates.
# Generated by /adev-init. Edit as needed, then run /adev-sync.

# ============================================================================
# Project Metadata
# ============================================================================

project:
  name: "{{ project_name }}"
  description: "{{ project_description }}"
  # Repository type: monorepo | single-app | library | cli
  type: single-app

# ============================================================================
# Sync Targets
# Defines which agent files are generated from the constitution.
# Each target gets a tailored version of the constitution content.
# Run /adev-sync after editing the constitution to update these.
# ============================================================================

sync:
  targets:
    - path: CLAUDE.md
      format: claude
      # Claude format includes full constitution + context kit summary + user additions section

    # Uncomment targets as needed:
    # - path: AGENTS.md
    #   format: agents
    #   # AGENTS.md format includes full constitution + project context pointer

    # - path: .github/copilot-instructions.md
    #   format: copilot
    #   # Copilot format includes principles and coding standards only (no context routing)

    # - path: .cursorrules
    #   format: cursor
    #   # Cursor format includes full constitution with Cursor-compatible references

# ============================================================================
# Modules
# Registered feature modules. Each module corresponds to a Feature Charter
# at .context-kit/specs/features/<module-slug>/charter.md
# ============================================================================

modules: []
  # - slug: auth
  #   name: Authentication
  #   paths:
  #     - src/auth/
  #     - src/middleware/auth.ts

  # - slug: api
  #   name: API Layer
  #   paths:
  #     - src/api/
  #     - src/routes/

# ============================================================================
# Specialists
# Domain expert subagent prompts for /adev-implement task routing.
# Each specialist is a markdown file with a system prompt.
# ============================================================================

specialists: []
  # - slug: database
  #   name: Database Specialist
  #   prompt: .context-kit/specialists/database.md
  #   triggers:
  #     - "*.prisma"
  #     - "src/db/**"
  #     - "migrations/**"

  # - slug: frontend
  #   name: Frontend Specialist
  #   prompt: .context-kit/specialists/frontend.md
  #   triggers:
  #     - "src/components/**"
  #     - "src/pages/**"
  #     - "*.css"

# ============================================================================
# Quality Gates
# Commands that must pass for implementation to be considered complete.
# These are also recorded in the constitution but listed here for tooling.
# ============================================================================

gates:
  test: ""          # e.g., "npm test", "pytest", "go test ./..."
  lint: ""          # e.g., "npm run lint", "ruff check .", "golangci-lint run"
  typecheck: ""     # e.g., "npx tsc --noEmit", "mypy .", "go vet ./..."
  # Custom gates (optional):
  # build: "npm run build"
  # bundle-size: "npx size-limit"

# ============================================================================
# Repo Map Configuration
# Controls how /adev-repomap scans the repository.
# ============================================================================

repomap:
  # File patterns to exclude from the repo map (in addition to .gitignore)
  exclude:
    - "node_modules/**"
    - "dist/**"
    - "build/**"
    - ".next/**"
    - "coverage/**"
    - "*.min.js"
    - "*.generated.*"
  # Supported languages are auto-detected. Override here if needed:
  # languages:
  #   - typescript
  #   - python

# ============================================================================
# Hygiene
# Configuration for /adev-hygiene audits.
# ============================================================================

hygiene:
  # Number of days before a spec is considered stale
  staleness_threshold_days: 30
  # Directories to check for charter coverage
  source_roots:
    - src/
  # Patterns to ignore in coverage checks
  coverage_exclude:
    - "src/**/*.test.*"
    - "src/**/*.spec.*"
    - "src/**/test/**"
    - "src/**/__tests__/**"
