# eval-config.yaml — Evaluation harness configuration
# This file lives at .context-index/evals/config.yaml
# Generated by /adev-eval --configure. Edit as needed.

# Which evaluation layers are active
layers:
  deterministic: true       # Layer 1: Quality gates (always on)
  architectural: true       # Layer 2: Pattern consistency, boundary compliance
  llm_judge: true           # Layer 3: LLM-as-a-Judge subjective scoring
  hitl: false               # Layer 4: Human-in-the-loop checkpoints (opt-in)

# Score thresholds
thresholds:
  minimum_score: 60         # Below this triggers a warning in reports
  exemplary_score: 90       # Above this flags as golden sample candidate

# Layer 3 configuration
llm_judge:
  rubric: default           # "default" or path to custom rubric file
  model: opus               # Model for the reviewer subagent

# Layer 4 configuration
hitl:
  # Which checkpoints are active (only when hitl layer is enabled)
  business_logic: true
  ux_review: false
  security_review: true
  performance_review: false
